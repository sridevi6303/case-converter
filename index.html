<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#dbeafe,#fce7f3);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        width:450px;
        text-align:center;
    }

    h1{
        margin-bottom:20px;
    }

    textarea{
        width:100%;
        height:120px;
        padding:10px;
        font-size:16px;
        border:1px solid #ccc;
        border-radius:8px;
        resize:none;
    }

    button{
        margin:8px;
        padding:10px 15px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        color:white;
        font-size:14px;
    }

    .upper{background:#3b82f6;}
    .lower{background:#22c55e;}
    .title{background:#f59e0b;}
    .clear{background:#ef4444;}
</style>
</head>

<body>

<div class="container">
    <h1>Case Converter</h1>

    <textarea id="textInput" placeholder="Type text here..."></textarea>

    <br>

    <button class="upper" onclick="toUpper()">UPPERCASE</button>
    <button class="lower" onclick="toLower()">lowercase</button>
    <button class="title" onclick="toTitle()">Title Case</button>
    <button class="clear" onclick="clearText()">Clear</button>
</div>

<script>
function toUpper(){
    let text=document.getElementById("textInput");
    text.value=text.value.toUpperCase();
}

function toLower(){
    let text=document.getElementById("textInput");
    text.value=text.value.toLowerCase();
}

function toTitle(){
    let text=document.getElementById("textInput");
    text.value=text.value
        .toLowerCase()
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
}

function clearText(){
    document.getElementById("textInput").value="";
}
</script>

</body>
</html>
